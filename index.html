<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camunda Playground</title>

  <style>
    html,
body,
#main-container {
  margin: 0;
  height: 100%;
}

#main-container {
  display: flex;
  flex-direction: column;
}

#editor-container {
  flex: 1;
  display: flex;
  min-height: 0;
}

#bottom-panel {
  height: 220px;
  min-height: 220px;
  border-top: 1px solid #ccc;
  overflow: hidden;
}
#canvas {
  flex: 1;
}

#properties {
  width: 320px;
  border-left: 1px solid #ccc;
}

#bottom-tabs {
  padding: 5px;
  background: #f5f5f5;
  border-bottom: 1px solid #ccc;
}

#bottom-tabs button {
  margin-right: 10px;
}

#problems-panel{
    background: white;
}
#output-panel {
  height: calc(100% - 40px);
  overflow: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th,
td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}
  </style>
</head>


  <body>
  <div id="main-container">

    <div id="editor-container">
      <div id="canvas"></div>
      <div id="properties"></div>
    </div>

    <div id="bottom-panel">

      <div id="bottom-tabs">
        <button id="problems-tab">Problems</button>
        <button id="output-tab">Output</button>
      </div>

      <div id="problems-panel">
        <table>
          <thead>
            <tr>
              <th>Severity</th>
              <th>Element</th>
              <th>Message</th>
            </tr>
          </thead>

          <tbody id="problems-list"></tbody>
        </table>
      </div>

      <div id="output-panel" style="display:none;">
        <pre id="output-text"></pre>
      </div>

    </div>

  </div>

  <script type="module" src="/app.js"></script>
</body>

</html>
