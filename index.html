<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camunda Playground</title>

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    #container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #canvas {
      flex: 1;
    }

    #properties {
      width: 320px;
      border-left: 1px solid #ccc;
      overflow: auto;
    }
  </style>
</head>

<body>
  <div id="container">
    <div id="canvas"></div>
    <div id="properties"></div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
